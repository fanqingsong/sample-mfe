# Gateway: single public entry for Sample MFE
# External: http://localhost:8080
#
#   /              -> host
#   /mf/user/      -> user-feat
#   /mf/product/   -> product-feat
#   /mf/order/     -> order-feat
#   /api/          -> be-apps

upstream mfe_host {
    server host:80;
}

upstream mfe_user {
    server user-feat:80;
}

upstream mfe_product {
    server product-feat:80;
}

upstream mfe_order {
    server order-feat:80;
}

upstream mfe_api {
    server be-apps:3000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20m;

    # Backend config API: /api/routes -> be-apps /routes
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mfe_api/;
    }

    # Module Federation remotes (path-based, same origin)
    location /mf/user/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mfe_user/;
    }

    location /mf/product/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mfe_product/;
    }

    location /mf/order/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mfe_order/;
    }

    location = /health {
        default_type text/plain;
        return 200 'ok';
    }

    # Host shell (SPA)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mfe_host;
    }
}
